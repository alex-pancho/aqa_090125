[loggers]
keys=root, json_logger, xml_logger

[handlers]
keys=json_log_handler, xml_log_handler

[formatters]
keys=json_log_formatter, xml_log_formatter

[logger_json_logger]
level=INFO
handlers=json_log_handler
qualname=json_logger

[logger_xml_logger]
level=INFO
handlers=xml_log_handler
qualname=xml_logger

[logger_root]
level=WARNING
handlers=

[handler_json_log_handler]
class=FileHandler
level=INFO
formatter=json_log_formatter
args=('json_validate_log.log',)

[handler_xml_log_handler]
class=StreamHandler
level=INFO
formatter=xml_log_formatter

[formatter_json_log_formatter]
format=[%(asctime)s] - [%(levelname)s]- %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_xml_log_formatter]
format=%(asctime)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
